<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fwtoolkit — CheckableList demo</title>
    <link rel="stylesheet" href="./fontawesome/css/all.min.css">
    <link rel="stylesheet" href="./css/fwtoolkit.css">
    <link rel="stylesheet" href="./demo.css">
    <style>
        body { padding: 2rem; }
        #checkable-host { margin-top: 1rem; }
        .demo-value { margin-top: 1rem; font-family: monospace; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
            "diff-dom": "https://esm.sh/diff-dom@5.2.1"
        }
    }
    </script>
    <script>
        window.gettext = s => s;
        window.staticUrl = s => s;
        window.interpolate = (fmt, arr) => fmt.replace(/%s/g, () => arr.shift());
    </script>
</head>
<body>
    <h1>CheckableList demo</h1>
    <p>Checkable labels rendered by <code>fwtoolkit/CheckableList</code>.</p>
    <div id="checkable-host"></div>
    <p class="demo-value">Selected: <span id="checkable-value">[]</span></p>

    <script type="module">
        import { CheckableList } from "./dist/index.js";

        const valueEl = document.getElementById("checkable-value");
        new CheckableList({
            dom: document.getElementById("checkable-host"),
            options: [
                { id: 1, label: "Category one" },
                { id: 2, label: "Category two" },
                { id: 3, label: "Category three" }
            ],
            initialValue: [1],
            multiple: true,
            onChange: selected => { valueEl.textContent = JSON.stringify(selected); }
        });
    </script>
</body>
</html>
