<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>fwtoolkit — DialogTabs demo</title>
        <link rel="stylesheet" href="../fontawesome/css/all.min.css" />
        <link rel="stylesheet" href="../css/fwtoolkit.css" />
        <link rel="stylesheet" href="../demo.css" />
        <style>
            body {
                padding: 2rem;
            }
            .demo-actions {
                display: flex;
                flex-wrap: wrap;
                gap: 1rem;
                margin: 1rem 0;
            }
            #tab-container {
                max-width: 600px;
            }
        </style>
        <script type="importmap">
            {
                "imports": {
                    "fwtoolkit": "../dist/index.js",
                    "prosemirror-commands": "https://esm.sh/prosemirror-commands@1.7.1?external=prosemirror-model,prosemirror-state,prosemirror-transform",
                    "prosemirror-history": "https://esm.sh/prosemirror-history@1.5.0?external=prosemirror-state,prosemirror-transform",
                    "prosemirror-keymap": "https://esm.sh/prosemirror-keymap@1.2.3?external=prosemirror-state",
                    "prosemirror-model": "https://esm.sh/prosemirror-model@1.25.9?target=es2022",
                    "prosemirror-state": "https://esm.sh/prosemirror-state@1.4.4?target=es2022",
                    "prosemirror-transform": "https://esm.sh/prosemirror-transform@1.12.0?external=prosemirror-model",
                    "prosemirror-view": "https://esm.sh/prosemirror-view@1.41.9?external=prosemirror-model,prosemirror-state,prosemirror-transform",
                    "simple-datatables": "https://esm.sh/simple-datatables@10.2.0",
                    "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
                    "diff-dom": "https://esm.sh/diff-dom@5.2.1"
                }
            }
        </script>

        <link rel="icon" type="image/png" href="../favicon.png" />
    </head>
    <body>
        <h1>DialogTabs demo</h1>
        <p>Tab switching rendered by <code>fwtoolkit/DialogTabs</code>.</p>
        <div class="demo-actions">
            <button id="show-tab-0" class="fw-button fw-light">
                Show first tab
            </button>
            <button id="show-tab-1" class="fw-button fw-light">
                Show second tab
            </button>
        </div>
        <div id="tab-container"></div>

        <script type="module">
            import { initSettings } from "fwtoolkit"
            import { DialogTabs } from "../dist/index.js"

            initSettings({
                apiUrl: url => url,
                getCsrfToken: () => "",
                gettext: s => s,
                staticUrl: s => "../" + s,
                interpolate: (fmt, arr) => fmt.replace(/%s/g, () => arr.shift())
            })

            const tabs = new DialogTabs([
                {
                    title: "General",
                    description: "General settings",
                    template: () => "<p>This is the general settings tab.</p>"
                },
                {
                    title: "Advanced",
                    description: "Advanced settings",
                    template: () => "<p>This is the advanced settings tab.</p>"
                }
            ])

            const container = document.getElementById("tab-container")
            container.innerHTML = tabs.render()
            tabs.bind(container)

            document
                .getElementById("show-tab-0")
                .addEventListener("click", () => tabs.showTab(0))
            document
                .getElementById("show-tab-1")
                .addEventListener("click", () => tabs.showTab(1))
        </script>
    </body>
</html>
