<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fwtoolkit — Drop-up demo</title>
    <link rel="stylesheet" href="../fontawesome/css/all.min.css">
    <link rel="stylesheet" href="../css/fwtoolkit.css">
    <link rel="stylesheet" href="../demo.css">
    <style>
        body { padding: 2rem; }
        #drop-up-anchor {
            position: relative;
            display: inline-block;
            margin-top: 8rem;
        }
        pre { background: #f4f4f4; padding: 1rem; overflow: auto; }
    </style>
        <script type="importmap">
        {
            "imports": {
                "fwtoolkit": "../dist/index.js",
                "prosemirror-commands": "https://esm.sh/prosemirror-commands@1.7.1?external=prosemirror-model,prosemirror-state,prosemirror-transform",
                "prosemirror-history": "https://esm.sh/prosemirror-history@1.5.0?external=prosemirror-state,prosemirror-transform",
                "prosemirror-keymap": "https://esm.sh/prosemirror-keymap@1.2.3?external=prosemirror-state",
                "prosemirror-model": "https://esm.sh/prosemirror-model@1.25.9?target=es2022",
                "prosemirror-state": "https://esm.sh/prosemirror-state@1.4.4?target=es2022",
                "prosemirror-transform": "https://esm.sh/prosemirror-transform@1.12.0?external=prosemirror-model",
                "prosemirror-view": "https://esm.sh/prosemirror-view@1.41.9?external=prosemirror-model,prosemirror-state,prosemirror-transform",
                "simple-datatables": "https://esm.sh/simple-datatables@10.2.0",
                "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
                "diff-dom": "https://esm.sh/diff-dom@5.2.1"
            }
        }
        </script>
    
    <link rel="icon" type="image/png" href="../favicon.png">
</head>
<body>
    <h1>Drop-up demo</h1>
    <p>A generic drop-up widget with keyboard navigation. Focus the button and press <kbd>Enter</kbd> or click it to open the drop-up.</p>
    <div id="drop-up-anchor">
        <button id="trigger" class="fw-button fw-light">Open drop-up</button>
    </div>
    <pre id="log">Actions will be logged here…</pre>

    <script type="module">
        import {initSettings} from "fwtoolkit";
        import { DropUp } from "../dist/index.js";

        initSettings({
            apiUrl: url => url,
            getCsrfToken: () => "",
            gettext: s => s,
            staticUrl: s => "../" + s,
            interpolate: (fmt, arr) => fmt.replace(/%s/g, () => arr.shift())
        });

        const log = msg => {
            const el = document.getElementById("log");
            el.textContent = `${new Date().toLocaleTimeString()} — ${msg}\n` + el.textContent;
        };

        const dropUp = new DropUp({
            head: "<div class=\"link-title\">Contributor</div>",
            options: [
                { title: "Edit", className: "edit-contributor", action: () => log("Edit") },
                { title: "Remove", className: "remove-contributor", action: () => log("Remove") }
            ],
            onClose: () => log("Drop-up closed")
        });

        const anchor = document.getElementById("drop-up-anchor");
        anchor.appendChild(dropUp.render());

        document.getElementById("trigger").addEventListener("click", () => {
            dropUp.open();
        });
    </script>
</body>
</html>
