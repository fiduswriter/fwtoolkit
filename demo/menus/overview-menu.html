<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>fwtoolkit — Overview menu demo</title>
        <link rel="stylesheet" href="../fontawesome/css/all.min.css" />
        <link rel="stylesheet" href="../css/fwtoolkit.css" />
        <link rel="stylesheet" href="../demo.css" />
        <style>
            body {
                padding: 2rem;
            }
            #fw-overview-menu {
                margin-bottom: 1rem;
            }
            pre {
                background: #f4f4f4;
                padding: 1rem;
                overflow: auto;
            }
        </style>
        <script type="importmap">
            {
                "imports": {
                    "fwtoolkit": "../dist/index.js",
                    "prosemirror-commands": "https://esm.sh/prosemirror-commands@1.7.1?external=prosemirror-model,prosemirror-state,prosemirror-transform",
                    "prosemirror-history": "https://esm.sh/prosemirror-history@1.5.0?external=prosemirror-state,prosemirror-transform",
                    "prosemirror-keymap": "https://esm.sh/prosemirror-keymap@1.2.3?external=prosemirror-state",
                    "prosemirror-model": "https://esm.sh/prosemirror-model@1.25.9?target=es2022",
                    "prosemirror-state": "https://esm.sh/prosemirror-state@1.4.4?target=es2022",
                    "prosemirror-transform": "https://esm.sh/prosemirror-transform@1.12.0?external=prosemirror-model",
                    "prosemirror-view": "https://esm.sh/prosemirror-view@1.41.9?external=prosemirror-model,prosemirror-state,prosemirror-transform",
                    "simple-datatables": "https://esm.sh/simple-datatables@10.2.0",
                    "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
                    "diff-dom": "https://esm.sh/diff-dom@5.2.1"
                }
            }
        </script>

        <link rel="icon" type="image/png" href="../favicon.png" />
    </head>
    <body>
        <h1>Overview menu demo</h1>
        <p>
            A keyboard-accessible application menu bar rendered from a model.
            Dropdowns hold flat lists of actions; long lists scroll
            automatically.
        </p>
        <ul id="fw-overview-menu"></ul>
        <pre id="log">Menu actions will be logged here…</pre>

        <script type="module">
            import { initSettings } from "fwtoolkit"
            import { OverviewMenuView } from "../dist/index.js"

            initSettings({
                apiUrl: url => url,
                getCsrfToken: () => "",
                gettext: s => s,
                staticUrl: s => "../" + s,
                interpolate: (fmt, arr) => fmt.replace(/%s/g, () => arr.shift())
            })

            const log = msg => {
                const el = document.getElementById("log")
                el.textContent =
                    `${new Date().toLocaleTimeString()} — ${msg}\n` +
                    el.textContent
            }

            const shortActions = [
                { title: "New", action: () => log("New file"), order: 1 },
                { title: "Open", action: () => log("Open file"), order: 2 },
                { title: "Save", action: () => log("Save file"), order: 3 }
            ]

            const longActions = Array.from({ length: 25 }, (_, i) => ({
                title: `Recent file ${i + 1}`,
                action: () => log(`Open recent file ${i + 1}`),
                order: i + 1
            }))

            const model = () => ({
                content: [
                    {
                        id: "file-menu",
                        title: "File",
                        type: "dropdown",
                        open: false,
                        order: 1,
                        content: shortActions
                    },
                    {
                        id: "edit-menu",
                        title: "Edit",
                        type: "dropdown",
                        open: false,
                        order: 2,
                        content: [
                            {
                                title: "Undo",
                                action: () => log("Undo"),
                                order: 1,
                                keys: "alt-z"
                            },
                            {
                                title: "Redo",
                                action: () => log("Redo"),
                                order: 2
                            }
                        ]
                    },
                    {
                        id: "open-recent-menu",
                        title: "Open recent",
                        type: "dropdown",
                        open: false,
                        order: 3,
                        content: longActions
                    },
                    {
                        id: "search-menu",
                        title: "Search",
                        type: "search",
                        icon: "search",
                        order: 4,
                        action: value => log(`Search: ${value}`)
                    }
                ]
            })

            const overview = {}
            const menuView = new OverviewMenuView(overview, model)
            menuView.init()
        </script>
    </body>
</html>
