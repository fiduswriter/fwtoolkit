<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fwtoolkit — Pulldown menu demo</title>
    <link rel="stylesheet" href="../fontawesome/css/all.min.css">
    <link rel="stylesheet" href="../css/fwtoolkit.css">
    <link rel="stylesheet" href="../demo.css">
    <style>
        body { padding: 2rem; }
        #menu-host {
            background: var(--cs-light-background, #ffffff);
            border: 1px solid var(--cs-light-border, #d0d0d0);
            padding: 8px 16px;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        pre { background: #f4f4f4; padding: 1rem; overflow: auto; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
            "diff-dom": "https://esm.sh/diff-dom@5.2.1"
        }
    }
    </script>
    <script>
        window.gettext = s => s;
        window.interpolate = (fmt, arr) => fmt.replace(/%s/g, () => arr.shift());
    </script>
</head>
<body>
    <h1>Pulldown menu demo</h1>
    <p>A keyboard-accessible horizontal menu bar with nested pulldown submenus.</p>
    <div id="menu-host"></div>
    <pre id="log">Menu actions will be logged here…</pre>

    <script type="module">
        import { PulldownMenu } from "../dist/index.js";

        const log = msg => {
            const el = document.getElementById("log");
            el.textContent = `${new Date().toLocaleTimeString()} — ${msg}\n` + el.textContent;
        };

        const context = { user: "Demo User" };

        const menu = {
            content: [
                {
                    id: "file",
                    title: "File",
                    type: "menu",
                    order: 1,
                    content: [
                        { id: "new", title: "New", type: "action", order: 1, action: () => log("New") },
                        { id: "open", title: "Open", type: "action", order: 2, action: () => log("Open") },
                        { id: "save", title: "Save", type: "action", order: 3, icon: "floppy-disk", action: () => log("Save") },
                        { id: "sep1", type: "separator", order: 4 },
                        {
                            id: "recent",
                            title: "Recent",
                            type: "menu",
                            order: 5,
                            content: [
                                { id: "doc1", title: "Document 1", type: "action", order: 1, action: () => log("Open Document 1") },
                                { id: "doc2", title: "Document 2", type: "action", order: 2, action: () => log("Open Document 2") }
                            ]
                        }
                    ]
                },
                {
                    id: "edit",
                    title: "Edit",
                    type: "menu",
                    order: 2,
                    content: [
                        { id: "undo", title: "Undo", type: "action", order: 1, keys: "Ctrl-z", action: () => log("Undo") },
                        { id: "redo", title: "Redo", type: "action", order: 2, action: () => log("Redo") }
                    ]
                },
                {
                    id: "view",
                    title: (ctx) => `View (${ctx.user})`,
                    type: "menu",
                    order: 3,
                    content: [
                        { id: "zoom-in", title: "Zoom in", type: "action", order: 1, action: () => log("Zoom in") },
                        { id: "zoom-out", title: "Zoom out", type: "action", order: 2, disabled: true, action: () => log("Zoom out") }
                    ]
                }
            ]
        };

        const pulldown = new PulldownMenu({
            menu,
            context,
            onClose: () => log("Menu closed")
        });

        pulldown.bind(document.getElementById("menu-host"));
    </script>
</body>
</html>
