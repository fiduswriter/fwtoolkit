<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fwtoolkit — Network helpers demo</title>
    <link rel="stylesheet" href="../fontawesome/css/all.min.css">
    <link rel="stylesheet" href="../css/fwtoolkit.css">
    <link rel="stylesheet" href="../demo.css">
    <style>
        body { padding: 2rem; }
        .demo-actions { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1rem 0; }
        pre { background: #f4f4f4; padding: 1rem; overflow: auto; max-height: 60vh; }
    </style>
        <script type="importmap">
        {
            "imports": {
                "fwtoolkit": "../dist/index.js",
                "prosemirror-commands": "https://esm.sh/prosemirror-commands@1.7.1?external=prosemirror-model,prosemirror-state,prosemirror-transform",
                "prosemirror-history": "https://esm.sh/prosemirror-history@1.5.0?external=prosemirror-state,prosemirror-transform",
                "prosemirror-keymap": "https://esm.sh/prosemirror-keymap@1.2.3?external=prosemirror-state",
                "prosemirror-model": "https://esm.sh/prosemirror-model@1.25.9?target=es2022",
                "prosemirror-state": "https://esm.sh/prosemirror-state@1.4.4?target=es2022",
                "prosemirror-transform": "https://esm.sh/prosemirror-transform@1.12.0?external=prosemirror-model",
                "prosemirror-view": "https://esm.sh/prosemirror-view@1.41.9?external=prosemirror-model,prosemirror-state,prosemirror-transform",
                "simple-datatables": "https://esm.sh/simple-datatables@10.2.0",
                "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
                "diff-dom": "https://esm.sh/diff-dom@5.2.1"
            }
        }
        </script>
    
    <link rel="icon" type="image/png" href="../favicon.png">
</head>
<body>
    <h1>Network helpers demo</h1>
    <p>The helpers below use <a href="https://jsonplaceholder.typicode.com/" target="_blank" rel="noopener">JSONPlaceholder</a> so you can see real fetch traffic.</p>
    <div class="demo-actions">
        <button id="get-post" class="fw-button fw-dark">GET a post</button>
        <button id="get-posts" class="fw-button fw-dark">GET posts (with wait)</button>
        <button id="post-post" class="fw-button fw-dark">POST a post</button>
    </div>
    <pre id="log">Responses will be logged here…</pre>

    <div id="fw-wait"><i class="fa fa-spinner fa-spin"></i></div>

    <script type="module">
        import { initSettings, getJson, postJson, activateWait, deactivateWait } from "../dist/index.js";

        initSettings({
            apiUrl: url => url,
            getCsrfToken: () => "demo-csrf-token"
        });

        const log = msg => {
            const el = document.getElementById("log");
            const text = typeof msg === "object" ? JSON.stringify(msg, null, 2) : String(msg);
            el.textContent = `${new Date().toLocaleTimeString()} — ${text}\n` + el.textContent;
        };

        document.getElementById("get-post").addEventListener("click", () => {
            getJson("https://jsonplaceholder.typicode.com/posts/1")
                .then(data => log(data))
                .catch(err => log(`Error: ${err.status || err.message}`));
        });

        document.getElementById("get-posts").addEventListener("click", () => {
            activateWait(true, "Fetching posts…");
            getJson("https://jsonplaceholder.typicode.com/posts?_limit=3")
                .then(data => {
                    deactivateWait();
                    log(data);
                })
                .catch(err => {
                    deactivateWait();
                    log(`Error: ${err.status || err.message}`);
                });
        });

        document.getElementById("post-post").addEventListener("click", () => {
            postJson("https://jsonplaceholder.typicode.com/posts", {
                title: "Hello from fwtoolkit",
                body: "This request was sent with the network helpers.",
                userId: 1
            })
                .then(({ json, status }) => log({ status, json }))
                .catch(err => log(`Error: ${err.status || err.message}`));
        });
    </script>
</body>
</html>
